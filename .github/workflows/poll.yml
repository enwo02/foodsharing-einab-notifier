name: EinAb Poller

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      notify_status:
        description: "Comma-separated list of status substrings to notify on"
        required: false
        default: "frei"
      skip_existing:
        description: "If true: first run after changes remembers existing entries (no notifications). If false: notifies immediately."
        required: false
        default: "false"
      dry_run:
        description: "If true: parses + prints but does not send Telegram messages."
        required: false
        default: "false"
      reset_state:
        description: "If true: clears state.json so existing entries can notify again (for testing)."
        required: false
        default: "true"

permissions:
  contents: write

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Poll sheet + notify
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SHEET_ID: 1blyF1PRpGZMLGf6ZzSXp88kkGnvtetEUJ7Mk3sV-ExM
          SHEET_GID: 917833898
          # For scheduled runs, `github.event.inputs` is empty, so we must not reference it unguarded.
          # Fallback to the default status substring (`frei`).
          NOTIFY_STATUS: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.notify_status || 'frei' }}
          SKIP_EXISTING: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.skip_existing || 'true') || 'true' }}
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.dry_run || 'false') || 'false' }}
          RESET_STATE: ${{ github.event_name == 'workflow_dispatch' && (github.event.inputs.reset_state || 'false') || 'false' }}
        run: |
          python notifier.py

      - name: Commit state if changed
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add state.json || true
            # Avoid failing the workflow on “nothing to commit”.
            git diff --cached --quiet || git commit -m "chore: update notifier state" || true
            git push || true
          fi

