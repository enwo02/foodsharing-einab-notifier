name: EinAb Poller

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Poll sheet + notify
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SHEET_ID: 1blyF1PRpGZMLGf6ZzSXp88kkGnvtetEUJ7Mk3sV-ExM
          SHEET_GID: 917833898
          NOTIFY_STATUS: frei
          SKIP_EXISTING: "true"
        run: |
          python notifier.py

      - name: Commit state if changed
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add state.json || true
            # Avoid failing the workflow on “nothing to commit”.
            git diff --cached --quiet || git commit -m "chore: update notifier state" || true
            git push || true
          fi

